<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00d2ff">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>German B1+/B2 Beruf - Vocabulary</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>German B1+/B2 Beruf</h1>
            <p class="subtitle">Interactive Professional Vocabulary Dictionary</p>
            <div class="stats" id="stats">Loading...</div>
        </header>

        <section class="controls glass">
            <div class="search-box">
                <input type="text" id="search" placeholder="Search (DE, EN, UA)..." autocomplete="off">
                <span class="search-icon">🔍</span>
            </div>
            <div class="filters">
                <button id="mode-toggle" class="mode-btn">🎓 Study Mode</button>
                <select id="level-filter">
                    <option value="all">All Levels</option>
                    <option value="B1+">B1+</option>
                    <option value="B2">B2</option>
                </select>
                <select id="thema-filter">
                    <option value="all">All Themes</option>
                    <!-- Will be populated by JS -->
                </select>
            </div>
        </section>

        <main id="vocabulary-main">
            <div id="vocabulary-grid" class="grid">
                <!-- Cards will be injected by JS -->
            </div>

            <div id="study-container" class="hidden">
                <div class="study-progress">
                    <span id="study-stats"></span>
                </div>
                <div class="scene">
                    <div id="study-card" class="study-card">
                        <div class="study-card-face study-card-front glass">
                            <!-- front content injected -->
                        </div>
                        <div class="study-card-face study-card-back glass">
                            <!-- back content injected -->
                        </div>
                    </div>
                </div>
                <div class="study-controls">
                    <button id="prev-btn" class="nav-btn">⬅️ Prev</button>
                    <button id="flip-btn" class="nav-btn">Flip (Space)</button>
                    <button id="next-btn" class="nav-btn">Next ➡️</button>
                </div>
            </div>
        </main>

        <footer>
            <p>Created for B2 Beruf IT German Studies</p>
            <div class="footer-links">
                <a href="../README.md">About Project</a>
                <a href="../AUDIO_GUIDE.md">Audio Guide</a>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
